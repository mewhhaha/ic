name: pr

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        run: |
          git init --quiet .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --quiet --depth=1 origin ${{ github.ref }}
          git checkout --quiet FETCH_HEAD

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: format
        run: |
          set -e
          while IFS= read -r -d '' file; do
            echo "format-check $file"
            deno fmt --check "$file"
          done < <(find . -name '*.ts' ! -path './src/frontend.test.ts' -print0)

      - name: lint
        run: deno lint

      - name: install wabt
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: run tests
        run: |
          mkdir -p /tmp/grok-goal-c35e95813d70/implementer
          deno test --no-check --allow-read --allow-write --allow-run
