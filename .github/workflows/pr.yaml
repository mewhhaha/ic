name: pr

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install wabt
        run: |
          sudo apt-get update
          sudo apt-get install -y wabt

      - name: run tests
        run: deno run --allow-read --allow-write --allow-run test.ts main.ts build/out.wat build/out.wasm
